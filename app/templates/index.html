<!DOCTYPE html>
<html>
<head>
    <title>TrendCast Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f7f7f7;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #444;
            max-width: 900px;
        }

        table {
            border-collapse: collapse;
            width: 80%;
            background: white;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #333;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .chart-container {
            width: 80%;
            margin-top: 30px;
            background: white;
            padding: 20px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <h1>TrendCast Market Intelligence Dashboard</h1>
    <p>This dashboard displays trend scores generated from market data across keywords and sources.</p>

    <table>
        <tr>
            <th>Keyword</th>
            <th>Trend Score</th>
            <th>Date</th>
            <th>Source</th>
        </tr>

        {% for row in records %}
        <tr>
            <td>{{ row.keyword }}</td>
            <td>{{ row.trend_score }}</td>
            <td>{{ row.score_date }}</td>
            <td>{{ row.source }}</td>
        </tr>
        {% endfor %}
    </table>

    <div class="chart-container">
        <canvas id="trendChart"></canvas>
    </div>

    <script>
        const labels = [
            {% for row in records %}
                "{{ row.keyword }}",
            {% endfor %}
        ];

        const values = [
            {% for row in records %}
                {{ row.trend_score }},
            {% endfor %}
        ];

        const ctx = document.getElementById('trendChart').getContext('2d');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Trend Score',
                    data: values
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        display: true
                    }
                }
            }
        });
    </script>
</body>
</html>
