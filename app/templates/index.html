<!DOCTYPE html>
<html>
<head>
    <title>TrendCast Dashboard</title>
    <p>This dashboard displays trend scores generated from market data across keywords and sources.</p>
    <style>
    body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background-color: #f7f7f7;
    }

    h1 {
        color: #333;
    }

    table {
        border-collapse: collapse;
        width: 80%;
        background: white;
    }

    th, td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: left;
    }

    th {
        background-color: #333;
        color: white;
    }

    tr:nth-child(even) {
        background-color: #f2f2f2;
    }
</style>
</head>
<body>
    <h1>TrendCast Market Intelligence Dashboard</h1>

    <table border="1" cellpadding="8">
        <tr>
            <th>Keyword</th>
            <th>Trend Score</th>
            <th>Date</th>
            <th>Source</th>
        </tr>

        {% for row in records %}
        <tr>
            <td>{{ row.keyword }}</td>
            <td>{{ row.trend_score }}</td>
            <td>{{ row.score_date }}</td>
            <td>{{ row.source }}</td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
